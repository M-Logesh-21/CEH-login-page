<!DOCTYPE html>
<html>
<head>
    <title>College Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }
        .login-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px gray;
        }
        img {
            width: 80px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgmeIxPvPQsVbhyIh62IF4UHfBzzQji0W82A&s" alt="College Logo">
    <h2>College Login</h2>

    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>

    <button>Login</button>
</div>

</body>
</html>
