<!DOCTYPE html>
<html>
<head>
    <title>Popup Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        /* Button */
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Popup background */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* Popup box */
        .popup-content {
            background: white;
            width: 300px;
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
        }

        .close {
            float: right;
            cursor: pointer;
            color: red;
        }
    </style>
</head>
<body>

<h2>Popup Demo</h2>

<button onclick="openPopup()">Open Popup</button>

<div class="popup" id="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">X</span>
        <h3>Hello!</h3>
        <p>This is a popup message.</p>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
